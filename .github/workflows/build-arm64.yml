name: Build Linux ARM64 Final (Docker Native)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3

      - name: Build and smoke test in official ARM64 Python container
        run: |
          docker run --rm -v ${{ github.workspace }}:/ws -w /ws arm64v8/python:3.10-buster /bin/bash -c "
            set -e

            apt-get update && apt-get install -y binutils gcc g++ make zlib1g-dev curl

            pip install --upgrade pip
            pip install -r requirements_linux.txt

            pip install pyinstaller --no-binary pyinstaller

            pyinstaller --onefile --clean \
                        --collect-all ortools \
                        --collect-all uvicorn \
                        --collect-all fastapi \
                        --collect-all pydantic \
                        --hidden-import=uvicorn.logging \
                        --hidden-import=uvicorn.loops.auto \
                        --hidden-import=uvicorn.protocols.http.auto \
                        --hidden-import=uvicorn.lifespan.on \
                        --name railway_app_arm64 main.py

            chmod -R 777 dist/

            ./dist/railway_app_arm64 &
            APP_PID=\$!

            sleep 8

            curl --fail http://127.0.0.1:2376/health

            kill \$APP_PID || true
            wait \$APP_PID || true
          "

      - name: Upload Finished Binary
        uses: actions/upload-artifact@v4
        with:
          name: railway-arm64-binary
          path: dist/railway_app_arm64
