name: Build Linux ARM64 Final (Conda + Ubuntu 18.04)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build on ARM64 Container
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          # 坚定使用 18.04，确保底层 GLIBC 是 2.27，绝对兼容甲方的 2.28
          distro: ubuntu18.04 
          githubToken: ${{ github.token }}
          
          run: |
            # 1. 安装 Ubuntu 18.04 基础工具 (不依赖它的老旧 Python)
            apt-get update
            apt-get install -y wget bzip2 binutils libatomic1 g++ gcc make zlib1g-dev
            
            # 2. 下载并静默安装 Miniconda (ARM64 专版)
            echo "开始安装 Miniconda..."
            wget https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-aarch64.sh -O miniconda.sh
            bash miniconda.sh -b -p /opt/conda
            
            # 3. 配置环境变量并强制指定 Python 3.10
            export PATH="/opt/conda/bin:$PATH"
            conda install -y python=3.10
            
            # 4. 使用纯净的 Python 3.10 环境安装依赖
            echo "开始安装 Python 依赖..."
            pip install --upgrade pip
            pip install -r requirements_linux.txt
            pip install pyinstaller
            
            # 5. 执行正式打包
            echo "开始使用 PyInstaller 打包..."
            pyinstaller --onefile --clean \
                        --collect-all ortools \
                        --hidden-import=uvicorn.logging \
                        --name railway_app_arm64 main.py

      - name: Upload Finished Binary
        uses: actions/upload-artifact@v4
        with:
          name: railway-arm64-binary
          path: dist/railway_app_arm64
