name: Build Linux ARM64 Final (Docker Native)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 启动 ARM 模拟器
      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3

      # 直接使用 Python 官方的纯净 ARM64 镜像 (基于 Debian 10，完美契合 GLIBC 2.28)
      - name: Build using official ARM64 Python container
        run: |
          docker run --rm -v ${{ github.workspace }}:/ws -w /ws arm64v8/python:3.10-buster /bin/bash -c "
            # 1. 安装基础编译环境
            apt-get update && apt-get install -y binutils gcc g++ make zlib1g-dev
            
            # 2. 安装你的依赖 (使用降级后的 txt)
            pip install --upgrade pip
            pip install -r requirements_linux.txt
            
            # 3. 【核心杀招】强制从源码编译安装 PyInstaller，杜绝任何非法高级指令
            pip install pyinstaller --no-binary pyinstaller
            
            # 4. 执行正式打包
            pyinstaller --onefile --clean \
                        --collect-all ortools \
                        --hidden-import=uvicorn.logging \
                        --name railway_app_arm64 main.py
            
            # 5. 赋予产物最高权限，防止外部读取失败
            chmod -R 777 dist/
          "

      - name: Upload Finished Binary
        uses: actions/upload-artifact@v4
        with:
          name: railway-arm64-binary
          path: dist/railway_app_arm64
